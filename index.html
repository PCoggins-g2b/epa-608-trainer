<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPA 608 Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">EPA 608 Certification Prep</p>
        <h1>EPA 608 Trainer</h1>
        <p class="subtitle">Study mode, exam mode, missed-question review, and practical technician tips.</p>
      </div>
     <div class="hero-actions">
  <button class="primary" onclick="startMode('study','all')">Study All</button>
  <button class="primary outline" onclick="startMode('exam','all')">Full Exam</button>
  <button class="secondary" onclick="showModules()">Learning Modules</button>
</div>
    </header>

    <section class="controls card">
      <h2>Choose a Section — each click starts a new randomized set</h2>
      <div id="sectionButtons" class="button-grid"></div>
    </section>

    <section class="stats">
      <div><span>Mode</span><strong id="modeStat">Ready</strong></div>
      <div><span>Section</span><strong id="sectionStat">—</strong></div>
      <div><span>Answered</span><strong id="answeredStat">0/0</strong></div>
      <div><span>Progress</span><strong id="progressStat">0%</strong></div>
    </section>

    <main id="quizCard" class="card quiz-card">
      <div id="questionMeta" class="pill">Ready</div>
      <h2 id="questionText">Choose Study Mode, Full Exam, or a section above to begin.</h2>
      <div class="progress"><div id="progressFill"></div></div>
      <div id="answers" class="answers"></div>
      <div id="learningBox" class="learning"></div>

      <div class="nav">
        <button onclick="previousQuestion()" id="prevBtn" class="prev" disabled>Prev</button>
        <button onclick="nextQuestion()" id="nextBtn" class="next" disabled>Next</button>
        <button onclick="finishSession()" class="success">Finish / Score</button>
        <button onclick="startMissedReview()" class="warning">Review Missed</button>
        <button onclick="showLibrary()" class="secondary">Question Library</button>
      </div>
    </main>

    <section id="results" class="card hidden"></section>
    <section id="mastery" class="card hidden"></section>
    <section id="library" class="card hidden"></section>
    <section id="modulesView" class="card hidden"></section>
  </div>

  <script src="app.js"></script>
</body>
</html>
